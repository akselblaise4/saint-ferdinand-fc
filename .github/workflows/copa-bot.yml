name: Copa Fácil Bot

on:
  schedule:
    # Chile Standard Time (UTC-4) in June:
    #   11:00 UTC = 7:00 CLT
    #   03:30 UTC = 23:30 CLT previous day
    - cron: '0 11 * * *'
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Copa Fácil Bot
        run: node scripts/copa-bot-ultimate.mjs

      - name: Copy data for site
        run: cp data/copa-data-ultimate.json data/copa-data.json

      - name: Check for changes
        id: changes
        run: |
          if git status --porcelain data/ | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push fresh data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Copa Fácil Bot"
          git config user.email "bot@copafacil"
          git add data/copa-data.json data/copa-data-ultimate.json
          git commit -m "bot: actualizar datos desde Copa Fácil [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
